<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>contextual-ui — Interactive Demo</title>
  <style>
    :root {
      --bg: #09090b; --surface: #18181b; --surface-2: #27272a;
      --border: #3f3f46; --text: #fafafa; --text-muted: #a1a1aa;
      --accent: #3b82f6; --accent-glow: rgba(59,130,246,0.4);
      --success: #22c55e; --success-glow: rgba(34,197,94,0.3);
      --radius: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 32px 24px;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 960px; margin: 0 auto; }

    /* ── Header ── */
    header { text-align: center; margin-bottom: 40px; }
    header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent); }
    header .tagline { font-size: 15px; color: var(--text-muted); margin-top: 6px; }

    /* ── Scenario cards ── */
    .scenarios {
      display: flex; gap: 10px; justify-content: center;
      flex-wrap: wrap; margin-bottom: 40px;
    }
    .scenario {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 14px 18px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-family: inherit; cursor: pointer;
      transition: all 0.25s ease; min-width: 140px;
    }
    .scenario:hover { border-color: var(--text-muted); transform: translateY(-2px); }
    .scenario.active {
      border-color: var(--accent);
      box-shadow: 0 0 24px var(--accent-glow), inset 0 0 12px rgba(59,130,246,0.06);
      transform: scale(0.97);
    }
    .scenario-icon { font-size: 24px; line-height: 1; }
    .scenario-question { font-size: 13px; font-weight: 600; text-align: center; }
    .scenario-meta { font-size: 11px; color: var(--text-muted); }

    /* ── Pipeline stepper ── */
    .pipeline { position: relative; margin-bottom: 32px; padding: 0 48px; }
    .pipeline-track {
      position: absolute; top: 6px;
      left: calc(12.5% + 7px); right: calc(12.5% + 7px);
      height: 2px; background: var(--border); z-index: 0;
    }
    .pipeline-fill {
      height: 100%; width: 0%; background: var(--accent);
      border-radius: 1px; transition: width 0.4s ease-out;
    }
    .pipeline-steps {
      display: flex; justify-content: space-between;
      position: relative; z-index: 1;
    }
    .step { display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 80px; }
    .step-dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--surface-2); border: 2px solid var(--border);
      transition: all 0.3s ease;
    }
    .step.active .step-dot {
      background: var(--accent); border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
      animation: pulse 1s ease-in-out infinite;
    }
    .step.complete .step-dot {
      background: var(--success); border-color: var(--success);
      box-shadow: 0 0 8px var(--success-glow); animation: none;
    }
    .step-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-muted); transition: color 0.3s ease;
    }
    .step.active .step-label, .step.complete .step-label { color: var(--text); }
    .step-detail {
      font-size: 11px; color: var(--accent);
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      min-height: 16px; opacity: 0; transition: opacity 0.3s ease;
      white-space: nowrap;
    }
    .step.complete .step-detail { opacity: 1; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 12px var(--accent-glow); }
      50% { box-shadow: 0 0 24px var(--accent-glow); }
    }

    /* ── Canvas output ── */
    .output-area {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .canvas-frame {
      position: relative; margin: 12px;
      border-radius: 8px; overflow: hidden; background: #0c0c14;
    }
    #output-canvas { display: block; width: 100%; border-radius: 8px; }
    .output-empty {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: #4a4a5a; font-size: 15px; z-index: 5;
      transition: opacity 0.3s ease;
    }
    .output-empty.hidden { opacity: 0; pointer-events: none; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      body { padding: 16px 12px; }
      .scenarios { gap: 8px; }
      .scenario { min-width: 110px; padding: 10px 12px; }
      .scenario-question { font-size: 12px; }
      .pipeline { padding: 0 20px; }
      .step { min-width: 60px; }
      .step-label { font-size: 10px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>contextual<span>-ui</span></h1>
      <p class="tagline">Data + intent in → UI out. No schemas. No config.</p>
    </header>

    <section class="scenarios" id="scenarios">
      <button class="scenario" data-id="sales">
        <span class="scenario-icon">📈</span>
        <span class="scenario-question">How are my sales?</span>
        <span class="scenario-meta">12 monthly records</span>
      </button>
      <button class="scenario" data-id="products">
        <span class="scenario-icon">📊</span>
        <span class="scenario-question">What sells the most?</span>
        <span class="scenario-meta">10 data points</span>
      </button>
      <button class="scenario" data-id="team">
        <span class="scenario-icon">👥</span>
        <span class="scenario-question">Show me the team</span>
        <span class="scenario-meta">5 members</span>
      </button>
      <button class="scenario" data-id="server">
        <span class="scenario-icon">🖥️</span>
        <span class="scenario-question">Server health check</span>
        <span class="scenario-meta">5 system metrics</span>
      </button>
      <button class="scenario" data-id="article">
        <span class="scenario-icon">📝</span>
        <span class="scenario-question">Read the article</span>
        <span class="scenario-meta">Long-form text</span>
      </button>
    </section>

    <section class="pipeline" id="pipeline">
      <div class="pipeline-track">
        <div class="pipeline-fill" id="pipeline-fill"></div>
      </div>
      <div class="pipeline-steps">
        <div class="step" id="step-0">
          <div class="step-dot"></div>
          <div class="step-label">Data</div>
          <div class="step-detail" id="detail-0"></div>
        </div>
        <div class="step" id="step-1">
          <div class="step-dot"></div>
          <div class="step-label">Analyze</div>
          <div class="step-detail" id="detail-1"></div>
        </div>
        <div class="step" id="step-2">
          <div class="step-dot"></div>
          <div class="step-label">Layout</div>
          <div class="step-detail" id="detail-2"></div>
        </div>
        <div class="step" id="step-3">
          <div class="step-dot"></div>
          <div class="step-label">Render</div>
          <div class="step-detail" id="detail-3"></div>
        </div>
      </div>
    </section>

    <section class="output-area">
      <div class="canvas-frame" id="canvas-frame">
        <canvas id="output-canvas"></canvas>
        <div class="output-empty" id="output-empty">
          <p>👆 Pick a scenario to see the magic</p>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="dist/interactive.js"></script>
</body>
</html>
